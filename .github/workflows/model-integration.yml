name: Model Integration

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/model-integration.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "models-api/**"
      - "models-runtime/**"
      - "models-backend-purejava/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/model-integration.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "models-api/**"
      - "models-runtime/**"
      - "models-backend-purejava/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qwen25-coder:
    name: Qwen2.5-Coder pure-Java integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout models
        uses: actions/checkout@v5
        with:
          path: models

      - name: Checkout ModelJars
        uses: actions/checkout@v5
        with:
          repository: ModelJars/modeljars
          path: model-jars

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache local model fixtures
        uses: actions/cache@v5
        with:
          path: ~/.jvllm/models/qwen2.5-coder-0.5b-instruct-q4_0.gguf
          key: qwen2-5-coder-0-5b-q4-0-v1

      - name: Download Qwen2.5-Coder fixture
        working-directory: models
        run: >
          ./gradlew
          :models-backend-purejava:downloadQwen25Coder05BQ40Model
          --no-daemon
          --stacktrace

      - name: Run Qwen2.5-Coder integration test
        working-directory: models
        run: >
          ./gradlew
          :models-backend-purejava:integrationTest
          --tests com.integrallis.models.backend.purejava.Qwen25CoderModelJarsIntegrationTest
          --no-daemon
          --stacktrace

      - name: Upload pure-Java integration reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qwen25-coder-integration-test-reports
          path: models/models-backend-purejava/build/reports/tests/
          retention-days: 30
