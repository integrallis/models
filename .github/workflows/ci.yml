name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build + Test
        run: ./gradlew spotlessCheck build

      - name: Generate SBOM
        run: ./gradlew cyclonedxDirectBom

      - name: Compliance Check
        run: ./gradlew complianceCheck

      - name: Upload SBOM
        uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: '*/build/reports/cyclonedx-direct/bom.json'
          retention-days: 90

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: '*/build/reports/tests/'
          retention-days: 30
