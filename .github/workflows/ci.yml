name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: models
    steps:
      - name: Checkout models
        uses: actions/checkout@v5
        with:
          path: models

      - name: Checkout vectors
        uses: actions/checkout@v5
        with:
          repository: integrallis/vectors
          ref: main
          path: vectors

      - name: Checkout ModelJars
        uses: actions/checkout@v5
        with:
          repository: ModelJars/modeljars
          ref: main
          path: model-jars

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup component add --toolchain 1.96.0 clippy rustfmt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build + Test
        run: ./gradlew spotlessCheck build

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Test Python RAG baseline
        run: |
          uv sync --project models-rag-bench/python --frozen --extra test
          uv run --project models-rag-bench/python --frozen pytest -q \
            models-rag-bench/python/tests

      - name: Generate SBOM
        run: ./gradlew cyclonedxDirectBom

      - name: Compliance Check
        run: ./gradlew complianceCheck

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: 'models/*/build/reports/cyclonedx-direct/bom.json'
          retention-days: 90

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: 'models/*/build/reports/tests/'
          retention-days: 30
