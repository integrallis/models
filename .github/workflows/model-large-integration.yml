name: Large Model Integration

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/model-large-integration.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "models-api/**"
      - "models-runtime/**"
      - "models-backend-purejava/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/model-large-integration.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "models-api/**"
      - "models-runtime/**"
      - "models-backend-purejava/**"
  workflow_dispatch:
    inputs:
      modeljars-ref:
        description: "ModelJars ref to test against"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  pure-java-large-model:
    name: ${{ matrix.name }} pure-Java slow test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Qwen2.5-Coder 7B
            cachePath: ~/.jvllm/models/qwen2.5-coder-7b-instruct-q4_0.gguf
            cacheKey: qwen25-coder-7b-q4_0-fixture-v1
            gradleTask: ":models-backend-purejava:qwen25Coder7BSlowTest"
            reportName: qwen25-coder-7b-slow-test-reports
          - name: DeepSeek-Coder 6.7B
            cachePath: ~/.jvllm/models/deepseek-coder-6.7b-instruct.Q4_K_M.gguf
            cacheKey: deepseek-coder-6.7b-q4_k_m-fixture-v1
            gradleTask: ":models-backend-purejava:deepSeekCoder67BSlowTest"
            reportName: deepseek-coder-6.7b-slow-test-reports
          - name: Qwen3 8B
            cachePath: ~/.jvllm/models/Qwen3-8B-Q4_K_M.gguf
            cacheKey: qwen3-8b-q4_k_m-fixture-v1
            gradleTask: ":models-backend-purejava:qwen38BSlowTest"
            reportName: qwen3-8b-slow-test-reports
          - name: DeepSeek-R1-Distill-Qwen-7B
            cachePath: ~/.jvllm/models/DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf
            cacheKey: deepseek-r1-distill-qwen-7b-q4_k_m-fixture-v1
            gradleTask: ":models-backend-purejava:deepSeekR1DistillQwen7BSlowTest"
            reportName: deepseek-r1-distill-qwen-7b-slow-test-reports
    steps:
      - name: Checkout models
        uses: actions/checkout@v5
        with:
          path: models

      - name: Checkout ModelJars
        uses: actions/checkout@v5
        with:
          repository: ModelJars/modeljars
          ref: ${{ github.event.inputs['modeljars-ref'] || 'main' }}
          path: model-jars

      - name: Checkout vectors
        uses: actions/checkout@v5
        with:
          repository: integrallis/vectors
          path: vectors

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache large-model fixture
        uses: actions/cache@v5
        with:
          path: ${{ matrix.cachePath }}
          key: ${{ matrix.cacheKey }}

      - name: Resolve fixture and run large-model slow test
        working-directory: models
        run: >
          ./gradlew
          ${{ matrix.gradleTask }}
          --no-daemon
          --stacktrace

      - name: Upload large-model integration reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.reportName }}
          path: models/models-backend-purejava/build/reports/tests/
          retention-days: 30
