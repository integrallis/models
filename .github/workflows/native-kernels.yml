name: Native Kernels

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/native-kernels.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "models-api/**"
      - "models-backend-native/**"
      - "models-backend-purejava/**"
      - "models-runtime/**"
      - "rust-toolchain.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/native-kernels.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "models-api/**"
      - "models-backend-native/**"
      - "models-backend-purejava/**"
      - "models-runtime/**"
      - "rust-toolchain.toml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish this verified CI version to GitHub Packages"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  version:
    name: Resolve private test version
    runs-on: ubuntu-24.04
    outputs:
      value: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout models
        uses: actions/checkout@v5

      - name: Build immutable CI version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(sed -n -E 's/^version[[:space:]]*=[[:space:]]*//p' gradle.properties)"
          BASE_VERSION="${BASE_VERSION%-SNAPSHOT}"
          SHORT_SHA="${GITHUB_SHA:0:12}"
          echo "value=${BASE_VERSION}-ci.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.${SHORT_SHA}" \
            >> "$GITHUB_OUTPUT"

  native:
    name: Native ${{ matrix.platform }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-x86_64
            library: libjmodels_kernels.so
            gradle: ./gradlew
          - runner: ubuntu-24.04-arm
            platform: linux-aarch64
            library: libjmodels_kernels.so
            gradle: ./gradlew
          - runner: macos-15-intel
            platform: macos-x86_64
            library: libjmodels_kernels.dylib
            gradle: ./gradlew
          - runner: macos-15
            platform: macos-aarch64
            library: libjmodels_kernels.dylib
            gradle: ./gradlew
          - runner: windows-2025
            platform: windows-x86_64
            library: jmodels_kernels.dll
            gradle: ./gradlew.bat
          - runner: windows-11-arm
            platform: windows-aarch64
            library: jmodels_kernels.dll
            gradle: ./gradlew.bat
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    defaults:
      run:
        working-directory: models
    steps:
      - name: Checkout models
        uses: actions/checkout@v5
        with:
          path: models

      - name: Checkout vectors
        uses: actions/checkout@v5
        with:
          repository: integrallis/vectors
          ref: main
          path: vectors

      - name: Checkout ModelJars
        uses: actions/checkout@v5
        with:
          repository: ModelJars/modeljars
          ref: main
          path: model-jars

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "25"

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup component add --toolchain 1.96.0 clippy rustfmt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile, test, and package native kernels
        run: >
          ${{ matrix.gradle }}
          :models-backend-native:check
          :models-backend-native:nativePlatformJar
          -Pversion=${{ needs.version.outputs.value }}
          -PmodelsNativePlatform=${{ matrix.platform }}
          --no-daemon
          --stacktrace

      - name: Upload native library and platform JAR
        uses: actions/upload-artifact@v7
        with:
          name: native-kernel-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          path: |
            models/models-backend-native/build/native-artifacts/models-kernels-${{ matrix.platform }}-${{ needs.version.outputs.value }}.jar
            models/models-backend-native/build/rust-target/release/${{ matrix.library }}

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-test-reports-${{ matrix.platform }}
          if-no-files-found: ignore
          retention-days: 30
          path: models/models-backend-native/build/reports/tests/

  java:
    name: Java backend JAR
    needs: version
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: models
    steps:
      - name: Checkout models
        uses: actions/checkout@v5
        with:
          path: models

      - name: Checkout vectors
        uses: actions/checkout@v5
        with:
          repository: integrallis/vectors
          ref: main
          path: vectors

      - name: Checkout ModelJars
        uses: actions/checkout@v5
        with:
          repository: ModelJars/modeljars
          ref: main
          path: model-jars

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Java backend JAR
        run: >
          ./gradlew
          :models-backend-native:jar
          -Pversion=${{ needs.version.outputs.value }}
          --no-daemon
          --stacktrace

      - name: Upload Java backend JAR
        uses: actions/upload-artifact@v7
        with:
          name: models-backend-native-java
          if-no-files-found: error
          retention-days: 30
          path: models/models-backend-native/build/libs/models-backend-native-${{ needs.version.outputs.value }}.jar

  bundle:
    name: Standalone private-test JAR
    needs: [version, native]
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: models
    steps:
      - name: Checkout models
        uses: actions/checkout@v5
        with:
          path: models

      - name: Checkout vectors
        uses: actions/checkout@v5
        with:
          repository: integrallis/vectors
          ref: main
          path: vectors

      - name: Checkout ModelJars
        uses: actions/checkout@v5
        with:
          repository: ModelJars/modeljars
          ref: main
          path: model-jars

      - name: Download verified native JARs
        uses: actions/download-artifact@v8
        with:
          pattern: native-kernel-*
          path: models/models-backend-native/build/ci-native-artifacts

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and verify standalone JAR
        run: >
          ./gradlew
          :models-backend-native:verifyPrivateTestBundle
          -Pversion=${{ needs.version.outputs.value }}
          -PmodelsNativeArtifactDirectory=models-backend-native/build/ci-native-artifacts
          --no-daemon
          --stacktrace

      - name: Upload standalone private-test JAR
        uses: actions/upload-artifact@v7
        with:
          name: models-backend-native-standalone
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          path: models/models-backend-native/build/native-artifacts/models-backend-native-standalone-${{ needs.version.outputs.value }}.jar

  publish:
    name: Publish private test packages
    needs: [version, native, java, bundle]
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: models
    steps:
      - name: Checkout models
        uses: actions/checkout@v5
        with:
          path: models

      - name: Checkout vectors
        uses: actions/checkout@v5
        with:
          repository: integrallis/vectors
          ref: main
          path: vectors

      - name: Checkout ModelJars
        uses: actions/checkout@v5
        with:
          repository: ModelJars/modeljars
          ref: main
          path: model-jars

      - name: Download verified native JARs
        uses: actions/download-artifact@v8
        with:
          pattern: native-kernel-*
          path: models/models-backend-native/build/ci-native-artifacts

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish Java backend and platform JARs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./gradlew
          :models-backend-native:publishAllPublicationsToGitHubPackagesRepository
          -Pversion=${{ needs.version.outputs.value }}
          -PmodelsGithubPackages=true
          -PmodelsNativeArtifactDirectory=models-backend-native/build/ci-native-artifacts
          --no-daemon
          --stacktrace
